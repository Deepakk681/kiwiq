# RabbitMQ Production Configuration
# Modern configuration file to replace deprecated environment variables

# Memory Management
# Set memory high watermark to 60% of available memory
vm_memory_high_watermark.relative = 0.6

# Disk Space Management
# Set disk free limit to 2GB
disk_free_limit.absolute = 2GB

# # Connection Management
# # Set maximum number of concurrent connections
# # This helps prevent resource exhaustion under high load
# max_connections = 1000

# # Channel Management
# # Set maximum number of channels per connection
# max_channels_per_connection = 2000

# # Network Configuration
# # TCP listener settings for better performance
# tcp_listen_options.backlog = 128
# tcp_listen_options.nodelay = true
# tcp_listen_options.exit_on_close = false
# tcp_listen_options.keepalive = true

# # Logging Configuration
# # Set log level to info for production
# log.console.level = info
# log.file.level = info

# # Management Plugin Configuration
# # Enable management plugin for monitoring
# management.tcp.port = 15672
# management.tcp.ip = 0.0.0.0

# # Performance Tuning
# # Heartbeat timeout (seconds)
# heartbeat = 60

# # Queue Settings
# # Default queue type
# default_queue_type = quorum

# # Clustering (if needed in future)
# # cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

# # Security Settings
# # Disable guest user for production security
# loopback_users.guest = false

# # Enable specific plugins
# # These will be loaded on startup
# plugins.0 = rabbitmq_management
# plugins.1 = rabbitmq_stream

# # Stream Configuration for workflow events
# stream.advertised_host = rabbitmq
# stream.tcp.port = 5552 