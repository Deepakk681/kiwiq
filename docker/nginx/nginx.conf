############################################
# 0.  ALLOWED ORIGINS  – configure here   #
############################################
map $http_origin $cors_allow_origin {
    default "";
    "http://localhost:3000"   $http_origin;
    "https://beta.kiwiq.ai"   $http_origin;
}
############################################
# 1.  Catch-all – send bogus hosts away   #
############################################
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
############################################
# 2.  HTTP listener for real domain       #
#     * ACME challenge stays on :80       #
#     * Everything else → HTTPS           #
############################################
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;
    # Let Certbot reach this path unabated
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # ---- PRE-FLIGHT ON HTTP ----
    # A redirect (30x) is illegal for a CORS pre-flight, so
    # intercept OPTIONS here and reply 204 with CORS headers.
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $cors_allow_origin  always;
        add_header Vary                            Origin              always;
        add_header Access-Control-Allow-Methods    "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers    "Authorization, Content-Type, X-Requested-With, X-Active-Org" always;
        add_header Access-Control-Allow-Credentials "true"             always;
        return 204;
    }
    # Everything else can safely redirect
    return 301 https://$host$request_uri;
}
############################################
# 3.  HTTPS → FastAPI (Docker service “app”)
############################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.prod.kiwiq.ai;
    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    # ---------- CORS (applies to EVERY response) ----------
    add_header Access-Control-Allow-Origin      $cors_allow_origin  always;
    add_header Vary                            Origin              always;
    add_header Access-Control-Allow-Methods    "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers    "Authorization, Content-Type, X-Requested-With, X-Active-Org" always;
    add_header Access-Control-Allow-Credentials "true"             always;
    location / {
        # ---- PRE-FLIGHT ON HTTPS ----
        if ($request_method = OPTIONS) {
            return 204;               # headers above are still added (because of “always”)
        }
        # ---- ACTUAL REQUESTS ----
        proxy_pass http://app:8000;     # <-- your FastAPI container / upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }
}