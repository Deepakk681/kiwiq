# 1) Catch‑all: any unmatched Host → kill the connection
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# 2) HTTP → HTTPS redirect for your real domain
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# 3) HTTPS proxy to your app
server {
    # Corrected listen directives (Fixes deprecation warning)
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on; # Enable HTTP/2 separately

    server_name api.prod.kiwiq.ai;

    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Define allowed origin variable for reuse within the server block if needed elsewhere,
    # but primary use is inside location block now.
    set $cors_origin "http://localhost:3000"; # Or "https://beta.kiwiq.ai" for prod

    location / {
        # --- CORS Handling moved entirely inside location block (Fixes 'add_header' error) ---

        # Handle OPTIONS requests (preflight)
        if ($request_method = 'OPTIONS') {
            # Check if the request origin is the one we want to allow
            if ($http_origin = $cors_origin) {
                # Add all necessary headers for successful preflight
                add_header Access-Control-Allow-Origin "$cors_origin" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org" always;
                # Optional: Set how long the browser can cache the preflight response
                # add_header Access-Control-Max-Age 86400 always; # 1 day

                # Standard preflight response (204 No Content)
                add_header Content-Length 0; # Required for 204
                return 204;
            }
            # If the origin ($http_origin) doesn't match $cors_origin, deny the preflight
            # You might want to return 204 without headers, but 403 is clearer.
            return 403; # Forbidden
        }

        # --- Add CORS headers for ACTUAL requests (non-OPTIONS) ---
        # If the request is not OPTIONS, it proceeds here.
        # Check if the Origin header matches our allowed origin for actual requests too.
        if ($http_origin = $cors_origin) {
            # Add headers needed by the browser for the actual response
            add_header Access-Control-Allow-Origin "$cors_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;
            # Optional: Expose custom headers if your frontend needs to read them
            # add_header Access-Control-Expose-Headers 'Content-Length, X-Your-Custom-Header' always;
        }

        # --- Proxy to backend (for non-OPTIONS requests) ---
        # This part is only reached if $request_method is not 'OPTIONS'
        proxy_pass         http://app:8000;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Optional proxy buffer settings
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }
}