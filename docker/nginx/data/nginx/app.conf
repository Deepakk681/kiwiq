# 1) Catch‑all: any unmatched Host → kill the connection
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# 2) HTTP → HTTPS redirect for your real domain
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# 3) HTTPS proxy to your app
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name api.prod.kiwiq.ai;

    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- CORS Configuration - Defined ONCE ---
    # Allow your specific frontend origin(s). Use a variable or map for flexibility if needed.
    # Using localhost:3000 for development example:
    set $cors_origin "http://localhost:3000";

    # Add headers ONLY if the request Origin matches the allowed origin
    # This is crucial for security and to avoid sending headers unnecessarily
    if ($http_origin = $cors_origin) {
        add_header Access-Control-Allow-Origin "$cors_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        # Expose headers if your frontend needs to read them (e.g., custom headers)
        # add_header Access-Control-Expose-Headers 'Content-Length, X-My-Custom-Header' always;
    }

    # Add Method/Header allowances globally - these are mainly checked by preflight
    # Note: It might be slightly cleaner to move these inside the 'if ($request_method = 'OPTIONS')'
    # block below, but having them here with 'always' covers error responses too.
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org" always;
    # Optional: Cache preflight response for 1 day (adjust as needed)
    # add_header Access-Control-Max-Age 86400 always;


    location / {
        # --- Handle OPTIONS requests (preflight) ---
        if ($request_method = 'OPTIONS') {
            # Check the origin again specifically for the preflight response
            if ($http_origin = $cors_origin) {
                # Add CORS headers required for preflight success *conditionally*
                # These are effectively duplicates of the server-level ones for OPTIONS,
                # but explicitly adding them here ensures they are present *before* the 204 return.
                # Alternatively, rely purely on the server-level `always` headers and just return 204.
                # Let's simplify and rely on the server-level ones:

                # Add a minimal response body header for robustness
                add_header 'Content-Length' 0;
                # Return "204 No Content" for successful preflight
                return 204;
            }
            # If the origin doesn't match, deny the preflight
            return 403; # Forbidden
        }

        # --- Proxy non-OPTIONS requests to the backend ---
        proxy_pass         http://app:8000;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme; # Crucial for backend

        # # Proxy buffer settings (optional, but can help with larger headers/responses)
        # proxy_buffer_size          128k;
        # proxy_buffers              4 256k;
        # proxy_busy_buffers_size    256k;

        # # The server-level 'add_header' directives with 'always' and the 'if ($http_origin = ...)'
        # # check will add the necessary Access-Control-Allow-Origin and Credentials headers
        # # to the response coming back from the proxy_pass IF the origin matches.
    }
}
