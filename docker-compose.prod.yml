# docker-compose.prod.yml
# Production environment Docker Compose configuration
# Requires a .env.prod file in the same directory.

# Version note: Using '3.8' or higher is recommended for newer features like healthcheck conditions.
# version: '3.8'

services:

  # Nginx Reverse Proxy with Certbot
  nginx:
    image: nginx:1.25-alpine
    container_name: kiwiq_prod_nginx
    restart: unless-stopped
    env_file:
      - .env
    # environment:
    #   - DOMAIN=${DOMAIN:-api.prod.kiwiq.ai}
    #   - APP_HOST=${APP_HOST:-app}
    #   - APP_PORT=${APP_PORT:-8000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/data/nginx:/etc/nginx/conf.d
      - ./docker/nginx/data/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/data/certbot/www:/var/www/certbot
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
      - prod_network
    depends_on:
      app:
        condition: service_started

  # Certbot for Let's Encrypt SSL certificates
  certbot:
    image: certbot/certbot
    container_name: kiwiq_prod_certbot
    restart: unless-stopped
    volumes:
      - ./docker/nginx/data/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - prod_network

  # Weaviate Vector Database Service
  weaviate:
    image: semitechnologies/weaviate:1.31.3  # Use specific version for production
    container_name: kiwiq_prod_weaviate
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Production Weaviate configuration
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_ANONYMOUS_ACCESS_ENABLED:-true}  # Disable for prod
      # AUTHENTICATION_APIKEY_ENABLED: ${WEAVIATE_APIKEY_ENABLED:-true}  # Enable API key auth for prod
      # AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEYS}  # Set API keys from env
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_MODULES: ${WEAVIATE_ENABLE_MODULES:-text2vec-openai,generative-openai}
      DEFAULT_VECTORIZER_MODULE: ${WEAVIATE_DEFAULT_VECTORIZER_MODULE:-text2vec-openai}
      ASYNC_INDEXING: ${WEAVIATE_ASYNC_INDEXING:-true}
      OPENAI_APIKEY: ${OPENAI_API_KEY}  # Required for OpenAI modules
      LOG_LEVEL: ${WEAVIATE_LOG_LEVEL:-info}
      # Production performance settings
      LIMIT_RESOURCES: ${WEAVIATE_LIMIT_RESOURCES:-true}
      GOMEMLIMIT: ${WEAVIATE_MEMORY_LIMIT:-2048MiB}
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: "1"
      RAFT_ENABLE_ONE_NODE_RECOVERY: "true"
      RAFT_BOOTSTRAP_TIMEOUT: "300"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - prod_network
    # No ports exposed externally - accessed via internal network only
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Optional: Add production logging
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "100m"
    #     max-file: "3"

  # Main Application Service (FastAPI/Uvicorn)
  app:
    build:
      context: .
      # Use the same Dockerfile as dev for now
      dockerfile: docker/Dockerfile.prod.app
      # Consider a separate Dockerfile.prod later for optimizations (e.g., no reload)
      # and to avoid running setup.sh on every start (see entrypoint note below).
    container_name: kiwiq_prod_app
    restart: unless-stopped
    # No ports exposed directly; Nginx handles external access.
    env_file:
      # Load production environment variables (includes full DB/Service URLs)
      - .env
    environment:
      # Override any dev-specific settings if necessary
      APP_ENV: PROD
      # Service URLs - ensure these match .env configuration
      # WEAVIATE_URL: "http://weaviate:8080"
      # Individual host vars are removed; rely on full URLs from .env.prod loaded above
      # POSTGRES_HOST: postgres
      # MONGO_HOST: mongo
      # RABBITMQ_HOST: rabbitmq
      # REDIS_HOST: redis
      # WEAVIATE_HOST: weaviate
      # Add other production-specific env vars if needed directly here
    volumes:
      # In production, typically you don't mount the source code directly.
      # The code should be copied into the image during the build.
      # Remove this line if using a dedicated Dockerfile.prod that copies the code.
      - ./:/app
    depends_on:
      # Explicitly depend on backend services and wait for postgres to be healthy
      weaviate:
        # condition: service_healthy
        condition: service_started
      mongo:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      # prefect-server:
      #   condition: service_started
      # prefect-agent:
      #   condition: service_started
    networks:
      - prod_network
    # command: ["uvicorn", "services.kiwi_app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    # NOTE on Entrypoint: Because this uses Dockerfile.prod.app, the ENTRYPOINT ["/app/setup.sh"]
    # from that file will run every time this container starts. This includes DB creation checks
    # and Alembic migrations. Ensure setup.sh is idempotent and consider if this is the desired
    # behavior for production restarts vs. running migrations as a separate deployment step.
    # Optional: Add production logging
    # logging:
    #   driver: "awslogs"
    #   ...

  # MongoDB Database Service
  mongo:
    # Use a specific version tag in production (e.g., mongo:6.0)
    image: mongo:latest
    container_name: kiwiq_prod_mongo
    restart: unless-stopped
    # Needed for MONGO_ROOT_USERNAME, MONGO_ROOT_PASSWORD
    env_file:
      - .env
    environment:
      # Load credentials from .env.prod
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    # Persist data
    volumes:
      - mongo_data:/data/db
    networks:
      - prod_network
    # No ports exposed externally
    # Optional: Add basic healthcheck for Mongo if needed
    # healthcheck:
    #   test: echo 'db.runCommand("ping").ok' | mongosh --quiet
    #   interval: 10s
    #   timeout: 10s
    #   retries: 5
    # Optional: Add production logging

  # PostgreSQL Database Service
  postgres:
    # Use a specific version tag in production (e.g., postgres:15)
    image: postgres:latest
    container_name: kiwiq_prod_postgres
    restart: unless-stopped
    # Needed for POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Main DB, others created by setup.sh if needed
      POSTGRES_DB: ${POSTGRES_DB}
      # POSTGRES_DATABASES is needed if setup.sh in the app container creates multiple DBs.
      # Ensure it's defined in .env.prod
      # POSTGRES_DATABASES: ${POSTGRES_DATABASES}
    # Persist data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prod_network
    # No ports exposed externally
    healthcheck:
      # Test if Postgres is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Give some time for initialization
      start_period: 10s
    # Optional: Add production logging

  # RabbitMQ Messaging Service
  rabbitmq:
    # Use specific version (e.g., rabbitmq:3.11-management-alpine)
    image: rabbitmq:3-management-alpine
    container_name: kiwiq_prod_rabbitmq
    restart: unless-stopped
    # Needed for RABBITMQ_DEFAULT_USER, RABBITMQ_DEFAULT_PASS
    env_file:
      - .env
    environment:
      # CRITICAL: Use strong, unique credentials from .env.prod
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      # Consider setting RABBITMQ_NODENAME for clarity
      # RABBITMQ_NODENAME: rabbit@kiwiq-prod
    # Persist data
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - prod_network
    # No ports exposed externally (including management UI 15672)
    # Access management UI via SSH tunnel or internal network if needed.
    # Optional: Add basic healthcheck
    # healthcheck:
    #   test: rabbitmq-diagnostics -q ping
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    # Optional: Add production logging

  # Redis Cache/Store Service
  redis:
    # Using latest Redis version for production
    image: redis:latest
    container_name: kiwiq_prod_redis
    restart: unless-stopped
    # Needed for REDIS_PASSWORD
    env_file:
      - .env
    # Load password from .env.prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Persist data
    volumes:
      - redis_data:/data
    networks:
      - prod_network
    # No ports exposed externally
    # Optional: Add basic healthcheck
    # healthcheck:
    #   test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    # Optional: Add production logging

  # Prefect Server Service (Orchestration API)
  prefect-server:
    # Use specific version tag (e.g., prefecthq/prefect:3.0.1-python3.12)
    image: prefecthq/prefect:3-latest
    container_name: kiwiq_prod_prefect_server
    restart: unless-stopped
    # Load Prefect specific variables
    env_file:
      - .env
    environment:
      # IMPORTANT: For production, consider using an external managed database (like RDS)
      # instead of the postgres container for Prefect's backend for better reliability/scalability.
      # If using the postgres container:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PREFECT_DB}"
      # If using external DB, ensure PREFECT_API_DATABASE_CONNECTION_URL is set correctly in .env.prod
      # if prefect server is hosted locally as UI, use localhost instead of inaccessible docker network hostname!
      PREFECT_API_URL: "http://localhost:4200/api"
      # Result Persistence (consider S3 or other external storage for production)
      PREFECT_TASKS_DEFAULT_PERSIST_RESULT: ${PREFECT_TASKS_DEFAULT_PERSIST_RESULT:-false}
      # PREFECT_RESULTS_DEFAULT_STORAGE_BLOCK: s3/your-prod-bucket # Example
    ports:
      - "4200:4200"
    # NOTE: Exposing Prefect UI/API port directly (4200) might not be desired in production.
    # Consider accessing via Nginx (requires adding a location block) or SSH tunnel.
    # ports:
    #   - "4200:4200" # Map Prefect Server UI/API port if needed directly
    # Persist Prefect server state (if using internal storage/SQLite)
    volumes:
      - prefect_data:/root/.prefect
    depends_on:
      # Only if using the internal postgres container for Prefect DB
      postgres:
        # Wait for postgres healthcheck
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - prod_network
    entrypoint: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    # No ports exposed externally by default
    # Optional: Add production logging

  # Prefect Agent Service (Runs flows)
  prefect-agent:
    build:
      context: .
      # Use worker Dockerfile
      dockerfile: docker/Dockerfile.worker
      # Consider a separate Dockerfile.prod later.
    container_name: kiwiq_prod_prefect_agent
    restart: unless-stopped
    # Load necessary credentials and config (includes full DB/Service URLs)
    env_file:
      - .env
    depends_on:
      # Wait for the server API
      prefect-server:
        # Or add healthcheck to prefect-server and use service_healthy
        condition: service_started
      # Add dependencies based on what the agent/flows need (e.g., app, db, mq)
      # app: # Agent might need application code/utilities
      #   condition: service_started
      weaviate:
        # condition: service_healthy
        condition: service_started
      postgres:
        # Wait for postgres healthcheck
        condition: service_healthy
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      app:
        condition: service_started
    environment:
      # PREFECT_API_URL: "http://prefect-server:4200/api" # Internal URL
      PREFECT_LOGGING_LEVEL: INFO
      # Individual host vars are removed; rely on full URLs from .env.prod loaded above
      # POSTGRES_HOST: postgres
      # MONGO_HOST: mongo
      # RABBITMQ_HOST: rabbitmq
      # REDIS_HOST: redis
      # Ensure DATABASE_URL, MONGO_URL etc. are correctly set via .env.prod or here if needed directly
    # Similar to app, mount code only if necessary and not baked into the image
    # Keep for now, consider removing for pure prod image
    volumes:
      - ./:/app
    # Command to start the agent polling a specific work pool and/or work queues
    # Replace 'default-agent-pool' and 'default' with your actual production work pool/queue name(s)
    # command: ["prefect", "agent", "start", "--pool", "default-agent-pool", "--work-queue", "default"]
    networks:
      - prod_network
    # Optional: Add production logging

# Define named volumes for data persistence
volumes:
  weaviate_data:
  mongo_data:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prefect_data:
  # Removed volumes for Nginx/Certbot as they're now using bind mounts

# Define the custom network for inter-service communication
networks:
  # Default bridge network driver 
  prod_network:
    driver: bridge
